{% set name = "ezuq" %}
{% set version = "0.0.1alpha" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: .
  #sha256: PLACEHOLDER_RUN_sha256sum_ON_YOUR_TARBALL

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python >=3.9
    - pip
    - hatchling          # match whatever build backend you chose in pyproject.toml
  run:
    - python >=3.11
    # Add your runtime dependencies here, e.g.:
    - numpy >=1.24
    - scipy >=1.10
    - pyyaml >=6.0
    - cantera >=3.0
    - rmg::rmg
    - salib >=1.4
    - pyyaml

test:
  imports:
    - ezuq
    - ezuq.util
  #source_files:
  #  - tests/
  #requires:
  #  - pytest
  #commands:
  #  - pytest tests/

about:
  home: https://github.com/comocheng/ezuq
  license: BSD-3-Clause
  license_file: LICENSE
  summary: "Put error bars on your microkinetic model"
  description: |
    Longer description of what ezuq does.
    Can span multiple lines.
  doc_url: https://github.com/comocheng/ezuq
  dev_url: https://github.com/comocheng/ezuq

extra:
  recipe-maintainers:
    - sevyharris              # replace with actual GitHub handle(s)
