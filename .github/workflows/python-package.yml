# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    defaults:
      run:
        shell: bash -el {0}  # allegedly required for conda to activate properly

    steps:
    - uses: actions/checkout@v4
    - name: Set up conda environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python-version }}
        environment-file: environment.yaml
        activate-environment: ezuq-env
        auto-activate-base: false
        channel-priority: strict
    - name: Install ezuq
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    #- name: Lint with flake8
    #  run: |
    #    # stop the build if there are Python syntax errors or undefined names
    #    flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    #    # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
    #    flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Debug conda environment
      run: |
        conda list | grep -i rmg
        python -c "import rmgpy; print(rmgpy.__file__)"
        python -c "import rmgpy.chemkin; print('chemkin OK')"
    - name: Test with pytest
      run: |
        pytest
